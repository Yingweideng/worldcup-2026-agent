  <style>
    :root {

      --green: #40b43e;

      --blue:  #4c9ef3;
      --text:  #f3f4f6;
      --muted: rgba(243,244,246,0.6);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px 12px 40px;
    }
    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      background: var(--cont);
      padding: 28px 24px 36px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    /* ── Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    .page-title { color: var(--gold); font-size: 20px; font-weight: 800; line-height: 1.3; }
    .page-date  { color: var(--green); font-size: 12px; margin-top: 4px; white-space: nowrap; }

    /* ── Section ── */
    .section-label {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 24px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(243,160,76,.25);
    }

    /* ── Card base ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    /* ── Feature ── */
    .feature-match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.3);
      padding: 16px 18px;
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .feature-team { text-align: center; font-weight: 700; font-size: 14px; flex: 1; }
    .feature-score {
      font-size: 30px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: .05em;
      text-align: center;
      min-width: 90px;
    }
    .feature-content { font-size: 14px; line-height: 1.75; color: var(--muted); }

    /* ── Match list ── */
    .match-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .match-row:last-child { border-bottom: none; }
    .match-teams {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .match-score {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      min-width: 60px;
      text-align: center;
    }
    .match-meta {
      font-size: 14px;
      color: var(--muted);
      text-align: right;
      min-width: 120px;
    }
    .match-note {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0 2px;
      line-height: 1.6;
    }

    /* ── Schedule ── */
    .schedule-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 8px;
    }
    .schedule-row:last-child { border-bottom: none; }
    .schedule-teams { font-size: 14px; font-weight: 700; flex: 1; }
    .schedule-time  { font-size: 14px; color: var(--blue); white-space: nowrap; }
    .schedule-group { font-size: 14px; color: var(--muted); white-space: nowrap; }

    /* ── Ranking ── */
    .ranking-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .ranking-table th {
      text-align: left;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      padding: 4px 6px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .ranking-table td {
      padding: 10px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .ranking-table tr:last-child td { border-bottom: none; }
    .rank-num  { color: var(--gold); font-weight: 800; width: 28px; }
    .rank-name { font-weight: 700; }
    .rank-team { color: var(--muted); font-size: 12px; }
    .rank-goals {
      font-size: 18px;
      font-weight: 900;
      color: var(--green);
      text-align: right;
    }
    .rank-pen  { font-size: 11px; color: var(--muted); text-align: right; }
    .medal-1::before { content: "🥇 "; }
    .medal-2::before { content: "🥈 "; }
    .medal-3::before { content: "🥉 "; }

    /* ── News feed ── */
    .news-item {
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      line-height: 1.6;
    }
    .news-item:last-child { border-bottom: none; }
    .news-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      background: rgba(243,160,76,0.15);
      color: var(--gold);
      border: 1px solid rgba(243,160,76,0.3);
      padding: 1px 6px;
      border-radius: 4px;
      margin-right: 7px;
      vertical-align: middle;
    }
    .news-text { font-size: 13px; font-weight: 600; }
    .news-link { font-size: 11px; color: var(--blue); text-decoration: none; }
    .news-link:hover { text-decoration: underline; }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(64,180,62,0.15);
      color: var(--green);
      border: 1px solid rgba(64,180,62,0.3);
    }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .footer a { color: var(--muted); }
  </style>
</head>

  <script>
  (function () {
    /* ── 国旗数据库（持续扩充） ── */
    const TEAM_FLAGS = {
      "United States":"🇺🇸","USA":"🇺🇸","美国":"🇺🇸",
      "Canada":"🇨🇦","加拿大":"🇨🇦",
      "Mexico":"🇲🇽","墨西哥":"🇲🇽",

      "France":"🇫🇷","法国":"🇫🇷",
      "England":"󠁧󠁢󠁥󠁮󠁧󠁿","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","英格兰":"🏴󠁧󠁢󠁥󠁮󠁧󠁿",
      "Germany":"🇩🇪","德国":"🇩🇪",
      "Spain":"🇪🇸","西班牙":"🇪🇸",
      "Portugal":"🇵🇹","葡萄牙":"🇵🇹",
      "Netherlands":"🇳🇱","荷兰":"🇳🇱",
      "Japan":"🇯🇵","日本":"🇯🇵",
      "South Korea":"🇰🇷","韩国":"🇰🇷",
      "Morocco":"🇲🇦","摩洛哥":"🇲🇦",
      "Senegal":"🇸🇳","塞内加尔":"🇸🇳",
      "Nigeria":"🇳🇬","尼日利亚":"🇳🇬",
      "Saudi Arabia":"🇸🇦","沙特":"🇸🇦",
      "Australia":"🇦🇺","澳大利亚":"🇦🇺",
      "Ecuador":"🇪🇨","厄瓜多尔":"🇪🇨",
      "Uruguay":"🇺🇾","乌拉圭":"🇺🇾",
      "Colombia":"🇨🇴","哥伦比亚":"🇨🇴",
      "Switzerland":"🇨🇭","瑞士":"🇨🇭",
      "Croatia":"🇭🇷","克罗地亚":"🇭🇷",
      "Poland":"🇵🇱","波兰":"🇵🇱",
      "Cameroon":"🇨🇲","喀麦隆":"🇨🇲",
      "Ghana":"🇬🇭","加纳":"🇬🇭",
      "Iran":"🇮🇷","伊朗":"🇮🇷",
      "Belgium":"🇧🇪","比利时":"🇧🇪",
      "Serbia":"🇷🇸","塞尔维亚":"🇷🇸",
      "Denmark":"🇩🇰","丹麦":"🇩🇰",
      "Tunisia":"🇹🇳","突尼斯":"🇹🇳",
      "Costa Rica":"🇨🇷","哥斯达黎加":"🇨🇷",
      "Ivory Coast":"🇨🇮","科特迪瓦":"🇨🇮",
      "Albania":"🇦🇱","阿尔巴尼亚":"🇦🇱",
      "Ukraine":"🇺🇦","乌克兰":"🇺🇦",
      "Turkey":"🇹🇷","土耳其":"🇹🇷",
      "Chile":"🇨🇱","智利":"🇨🇱",
      "Austria":"🇦🇹","奥地利":"🇦🇹",
      "Hungary":"🇭🇺","匈牙利":"🇭🇺",
      "Slovakia":"🇸🇰","斯洛伐克":"🇸🇰",
      "Slovenia":"🇸🇮","斯洛文尼亚":"🇸🇮",
      "TBD":"⚽"
    };
    const flag = n => TEAM_FLAGS[n] || "⚽";

    /* ── 渲染器字典 ── */
    const renderers = {

      feature(b) {
        let matchHtml = "";
        if (b.home && b.away) {
          const scoreHtml = b.score
            ? `<div class="feature-score">${esc(b.score)}</div>`
            : `<div class="feature-score" style="font-size:13px;color:var(--muted)">VS</div>`;
          matchHtml = `
            <div class="feature-match">
              <table width="100%">
                <tbody>
                  <tr>
                    <th width="10%"><img src="${b.home_flag}" width="36" alt="Flag of ${flag(b.home)}"></th>
                    <th width="25%"><div class="feature-team">${esc(b.home)}</div></th>
                    <th width="30%">${scoreHtml}</th>
                    <th width="25%"><div class="feature-team">${esc(b.away)}</div></th>
                    <th width="10%" text-align="left"><img src="${b.away_flag}" width="36" alt="Flag of ${flag(b.away)}"></th>
                  </tr>
                </tbody>
              </table>
            </div>`;
        }
        return matchHtml + `<div class="feature-content">${esc(b.content || "")}</div>`;
      },

      match_list(b) {
        return (b.items || []).map(m => {
          const scoreStr = (m.home_score !== undefined && m.away_score !== undefined)
            ? `${m.home_score} : ${m.away_score}` : "- : -";
          const meta = [m.kickoff_et, m.venue, m.group].filter(Boolean).join(" · ");
          const noteHtml = m.note
            ? `<div class="match-note">💬 ${esc(m.note)}</div>` : "";
          return `
            <div class="match-row">
              <div style="flex:1">
                <div class="match-teams">
                  <table width="80%">
                    <tbody>
                      <tr>
                        <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${flag(m.home_team)}"></th>
                        <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                        <th width="30%">${scoreStr}</th>
                        <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                        <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${flag(m.away_team)}"></th>
                      </tr>
                    </tbody>
                  </table> 
                </div>
                ${noteHtml}
              </div>
              <div class="match-meta">${esc(meta)}</div>
            </div>`;
        }).join("");
      },

      schedule(b) {
        return (b.items || []).map(m => `
          <div class="schedule-row">
            <div class="schedule-teams">
              <table width="80%">
                <tbody>
                  <tr>
                    <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${flag(m.home_team)}"></th>
                    <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                    <th width="30%"><span style="color:var(--muted); font-weight:400; font-size:22px; margin:0 6px">vs</span></th>
                    <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                    <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${flag(m.away_team)}"></th>
                  </tr>
                </tbody>
              </table> 
            </div>
            <div class="schedule-time">⏰ ${esc(m.kickoff_et || "TBD")}</div>
            ${m.group ? `<div class="schedule-group">[${esc(m.group)}]</div>` : ""}
          </div>`).join("");
      },

      ranking(b) {
        const medals = ["medal-1","medal-2","medal-3"];
        const rows = (b.items || []).map((r, i) => {
          const medalClass = medals[i] || "";
          const penHtml = r.penalties
            ? `<div class="rank-pen">含点球 ${r.penalties}</div>` : "";
          return `
            <tr>
              <td class="rank-num">${r.rank}</td>
              <td>
                <div class="rank-name ${medalClass}">${esc(r.player_name)}</div>
                <div class="rank-team">${flag(r.team_name)} ${esc(r.team_name)}</div>
              </td>
              <td class="rank-goals">${r.goals}</td>
              <td>${penHtml}</td>
            </tr>`;
        }).join("");
        return `
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th><th>球员 · 国家队</th>
                <th style="text-align:right">进球</th>
                <th style="text-align:right">点球</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      },

      news_feed(b) {
        return (b.items || []).map(n => `
          <div class="news-item">
            <span class="news-tag">${esc(n.tag || "新闻")}</span>
            <span class="news-text">${esc(n.text || "")}</span><br>
            ${n.url ? `<a class="news-link" href="${esc(n.url)}" target="_blank" rel="noopener">→ 查看详情</a>` : ""}
          </div>`).join("");
      }
    };

    /* ── 图标映射 ── */
    const BLOCK_ICONS = {
      feature: "🏆", match_list: "📊",
      ranking: "⚽", schedule: "📅", news_feed: "📰"
    };

    /* ── XSS 转义 ── */
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── 主渲染 ── */
    document.addEventListener("DOMContentLoaded", () => {
      const app = document.getElementById("app");
      try {
        const raw  = document.getElementById("data-json").textContent;
        const data = JSON.parse(raw);
        const html = (data.blocks || []).map(b => {
          const icon    = BLOCK_ICONS[b.type] || "•";
          const inner   = renderers[b.type] ? renderers[b.type](b) : "";
          return `
            <div class="section-label">${icon} ${esc(b.title || b.type)}</div>
            <div class="card">${inner}</div>`;
        }).join("");
        app.innerHTML = html || "<p style='color:var(--muted)'>暂无内容</p>";
      } catch(e) {
        app.innerHTML = `<p style="color:var(--red)">⚠ 数据加载失败：${esc(e.message)}</p>`;
      }
    });
  })();
  </script>
