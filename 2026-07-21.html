      const app = document.getElementById("app");
      try {
        const raw  = document.getElementById("data-json").textContent;
        const data = JSON.parse(raw);
        const html = (data.blocks || []).map(b => {
          const icon    = BLOCK_ICONS[b.type] || "•";
          const inner   = renderers[b.type] ? renderers[b.type](b) : "";
          return `
            <div class="section-label">${icon} ${esc(b.title || b.type)}</div>
            <div class="card">${inner}</div>`;
        }).join("");
        app.innerHTML = html || "<p style='color:var(--muted)'>暂无内容</p>";
      } catch(e) {
        app.innerHTML = `<p style="color:var(--red)">⚠ 数据加载失败：${esc(e.message)}</p>`;
      }
    });
  })();
  </script>
</body>
</html>
