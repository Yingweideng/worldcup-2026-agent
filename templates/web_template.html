<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>{dynamic_title} - {today_str}</title>
    <style>
        :root { --bg:#0b0f19; --cont:#111b15; --card:#1c2a21; --gold:#f3a04c; --green:#40b43e; --text:#f3f4f6; --muted:rgba(243,244,246,0.7); }
        body { font-family:sans-serif; background:var(--bg); color:var(--text); margin:0; padding:20px; }
        .wrapper { max-width:700px; margin:0 auto; background:var(--cont); padding:30px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); }
        .section-title { color:var(--gold); font-weight:700; margin:20px 0 10px; font-size:14px; }
        .card { background:var(--card); border-left:4px solid var(--green); padding:20px; border-radius:12px; margin-bottom:20px; }
        .focus-match { display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; margin-bottom:15px; }
        .score { font-size:24px; font-weight:800; color:var(--gold); }
        .news-item { border-bottom:1px solid rgba(255,255,255,0.05); padding:10px 0; }
        .tag { font-size:10px; background:rgba(243,160,76,0.2); color:var(--gold); padding:2px 6px; border-radius:4px; margin-right:8px; }
        a { color:var(--gold); text-decoration:none; border-bottom:1px dotted; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2 style="color:var(--gold)">{dynamic_title} <small style="float:right; font-size:12px; color:var(--green)">{today_str}</small></h2>
        <div id="app"></div>
    </div>
    <script id="data-json" type="application/json">{data_json}</script>
    <script>
        const teamDb = {"美国":"🇺🇸","德国":"🇩🇪","加拿大":"🇨🇦","墨西哥":"🇲🇽","阿根廷":"🇦🇷"};
        const flag = (n) => teamDb[n.trim()] || "⚽";
        const renderers = {
            feature(b) {
                let h = b.score ? `<div class="focus-match"><div>${flag(b.home)} ${b.home}</div><div class="score">${b.score}</div><div>${b.away} ${flag(b.away)}</div></div>` : "";
                return h + `<div>${b.content}</div>`;
            },
            news_feed(b) {
                return b.items.map(n => `<div class="news-item"><span class="tag">${n.tag}</span><b>${n.text}</b><br><small><a href="${n.url}">${n.source}</a></small></div>`).join("");
            }
        };
        document.addEventListener("DOMContentLoaded", () => {
            const app = document.getElementById("app");
            try {
                const data = JSON.parse(document.getElementById("data-json").textContent);
                app.innerHTML = data.blocks.map(b => `<div class="section-title">${b.title}</div><div class="card">${renderers[b.type](b)}</div>`).join("");
            } catch (e) { app.innerHTML = "数据加载失败"; }
        });
    </script>
</body>
</html>
