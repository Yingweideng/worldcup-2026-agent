      font-size: 17px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 24px 0 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(243,160,76,.25);
    }

    /* ── Card base ── */
    .card {
      background: var(--card);

      padding: 18px 20px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.05);

    .feature-match {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.3);
      padding: 16px 18px;
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .feature-team { text-align: center; font-weight: 700; font-size: 14px; flex: 1; }
    .feature-score {
      font-size: 30px;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: .05em;
      text-align: center;
      min-width: 90px;

    /* ── Match list ── */
    .match-row {

      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);

      gap: 8px;
      font-size: 14px;
      font-weight: 700;

      font-weight: 800;

    .match-meta {
      font-size: 14px;
      color: var(--muted);
      text-align: right;
      min-width: 120px;
    }
    .match-note {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0 2px;
      line-height: 1.6;
    }

      display: flex;

      justify-content: space-between;

        gap: 16px;
        margin-top: 12px;
    }
    .group-card {
        background: var(--card-bg, #fff);

        border-radius: 12px;

      text-align: left;

    .rank-team { color: var(--muted); font-size: 12px; }
    .rank-goals {
      font-size: 18px;
      font-weight: 900;
      color: var(--green);
      text-align: right;
    }
    .rank-pen  { font-size: 11px; color: var(--muted); text-align: right; }
    .medal-1::before { content: "🥇 "; }
    .medal-2::before { content: "🥈 "; }
    .medal-3::before { content: "🥉 "; }

    .news-item {

      margin-top: 28px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
    .footer a { color: var(--muted); }

            </div>`;
        }
        return matchHtml + `<div class="feature-content">${esc(b.content || "")}</div>`;
      },

      match_list(b) {
        return (b.items || []).map(m => {
          const scoreStr = (m.home_score !== undefined && m.away_score !== undefined)
            ? `${m.home_score} : ${m.away_score}` : "- : -";
          const meta = [m.kickoff_et, m.venue, m.group].filter(Boolean).join(" · ");
          const noteHtml = m.note
            ? `<div class="match-note">💬 ${esc(m.note)}</div>` : "";
          return `
            <div class="match-row">
              <div style="flex:1">
                <div class="match-teams">
                  <table width="80%">
                    <tbody>
                      <tr>
                        <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${m.home_team}"></th>
                        <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                        <th width="30%">${scoreStr}</th>
                        <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                        <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${m.away_team}"></th>
                      </tr>
                      <tr>
                        <th cols="5" text-align="left"><div>${m.get(match_note)}</div></th>
                      </tr>
                    </tbody>
                  </table> 
                </div>
                ${noteHtml}
              </div>
              <div class="match-meta">${esc(meta)}</div>
            </div>`;
        }).join("");
      },

      schedule(b) {
        return (b.items || []).map(m => `
          <div class="schedule-row">
            <div class="schedule-teams">
              <table width="80%">
                <tbody>
                  <tr>
                    <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${m.home_team}"></th>
                    <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                    <th width="30%"><span style="color:var(--muted); font-weight:400; font-size:22px; margin:0 6px">vs</span></th>
                    <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                    <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${m.away_team}"></th>
                  </tr>
                  <tr>
                    <th cols="5" text-align="left"><div>${m.get(schedule_note)}</div></th>
                  </tr>
                </tbody>
              </table> 
            </div>
            <div class="schedule-time">⏰ ${esc(m.kickoff_et || "TBD")}</div>
            ${m.group ? `<div class="schedule-group">[${esc(m.group)}]</div>` : ""}
          </div>`).join("");
      },

      ranking(b) {
        const medals = ["medal-1","medal-2","medal-3"];
        const rows = (b.items || []).map((r, i) => {
          const medalClass = medals[i] || "";
          const penHtml = r.penalties
            ? `<div class="rank-pen">含点球 ${r.penalties}</div>` : "";
          return `
            <tr>
              <td class="rank-num">${r.rank}</td>
              <td>
                <div class="rank-name ${medalClass}">${esc(r.player_name)}</div>
                <div class="rank-team">${esc(r.team_emoji)} ${esc(r.team_name)}</div>
              </td>
              <td class="rank-goals">${r.goals}</td>
              <td>${penHtml}</td>
            </tr>`;
        }).join("");
        return `
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th><th>球员 · 国家队</th>
                <th style="text-align:right">进球</th>
                <th style="text-align:right">点球</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      },

      news_feed(b) {
        return (b.items || []).map(n => `
          <div class="news-item">
            <span class="news-tag">${esc(n.tag || "新闻")}</span>
            <span class="news-text">${esc(n.text || "")}</span><br>
            ${n.url ? `<a class="news-link" href="${esc(n.url)}" target="_blank" rel="noopener">→ 查看详情</a>` : ""}
          </div>`).join("");
      }
    };

    /* ── 图标映射 ── */
    const BLOCK_ICONS = {
      feature: "🏆", match_list: "📊", schedule: "📅", 
      ranking: "⚽", standings: "📊", news_feed: "📰"
    };

    /* ── XSS 转义 ── */
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* ── 主渲染 ── */
    document.addEventListener("DOMContentLoaded", () => {
      const app = document.getElementById("app");
      try {
        const raw  = document.getElementById("data-json").textContent;
        const data = JSON.parse(raw);
        const html = (data.blocks || []).map(b => {
          const icon    = BLOCK_ICONS[b.type] || "•";
          const inner   = renderers[b.type] ? renderers[b.type](b) : "";
          return `
            <div class="section-label">${icon} ${esc(b.title || b.type)}</div>
            <div class="card">${inner}</div>`;
        }).join("");
        app.innerHTML = html || "<p style='color:var(--muted)'>暂无内容</p>";
      } catch(e) {
        app.innerHTML = `<p style="color:var(--red)">⚠ 数据加载失败：${esc(e.message)}</p>`;
      }
    });
  })();
  </script>
</body>
</html>
