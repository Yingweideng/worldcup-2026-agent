      "Senegal":"рҹҮёрҹҮі","еЎһеҶ…еҠ е°”":"рҹҮёрҹҮі",
      "Nigeria":"рҹҮірҹҮ¬","е°јж—ҘеҲ©дәҡ":"рҹҮірҹҮ¬",
      "Saudi Arabia":"рҹҮёрҹҮҰ","жІҷзү№":"рҹҮёрҹҮҰ",
      "Australia":"рҹҮҰрҹҮә","жҫіеӨ§еҲ©дәҡ":"рҹҮҰрҹҮә",
      "Ecuador":"рҹҮӘрҹҮЁ","еҺ„з“ңеӨҡе°”":"рҹҮӘрҹҮЁ",
      "Uruguay":"рҹҮәрҹҮҫ","д№ҢжӢүеңӯ":"рҹҮәрҹҮҫ",
      "Colombia":"рҹҮЁрҹҮҙ","е“ҘдјҰжҜ”дәҡ":"рҹҮЁрҹҮҙ",
      "Switzerland":"рҹҮЁрҹҮӯ","з‘һеЈ«":"рҹҮЁрҹҮӯ",
      "Croatia":"рҹҮӯрҹҮ·","е…ӢзҪ—ең°дәҡ":"рҹҮӯрҹҮ·",
      "Poland":"рҹҮөрҹҮұ","жіўе…°":"рҹҮөрҹҮұ",
      "Cameroon":"рҹҮЁрҹҮІ","е–ҖйәҰйҡҶ":"рҹҮЁрҹҮІ",
      "Ghana":"рҹҮ¬рҹҮӯ","еҠ зәі":"рҹҮ¬рҹҮӯ",
      "Iran":"рҹҮ®рҹҮ·","дјҠжң—":"рҹҮ®рҹҮ·",
      "Belgium":"рҹҮ§рҹҮӘ","жҜ”еҲ©ж—¶":"рҹҮ§рҹҮӘ",
      "Serbia":"рҹҮ·рҹҮё","еЎһе°”з»ҙдәҡ":"рҹҮ·рҹҮё",
      "Denmark":"рҹҮ©рҹҮ°","дё№йәҰ":"рҹҮ©рҹҮ°",
      "Tunisia":"рҹҮ№рҹҮі","зӘҒе°јж–Ҝ":"рҹҮ№рҹҮі",
      "Costa Rica":"рҹҮЁрҹҮ·","е“Ҙж–Ҝиҫҫй»ҺеҠ ":"рҹҮЁрҹҮ·",
      "Ivory Coast":"рҹҮЁрҹҮ®","з§‘зү№иҝӘз“Ұ":"рҹҮЁрҹҮ®",
      "Albania":"рҹҮҰрҹҮұ","йҳҝе°”е·ҙе°јдәҡ":"рҹҮҰрҹҮұ",
      "Ukraine":"рҹҮәрҹҮҰ","д№Ңе…Ӣе…°":"рҹҮәрҹҮҰ",
      "Turkey":"рҹҮ№рҹҮ·","еңҹиҖіе…¶":"рҹҮ№рҹҮ·",
      "Chile":"рҹҮЁрҹҮұ","жҷәеҲ©":"рҹҮЁрҹҮұ",
      "Austria":"рҹҮҰрҹҮ№","еҘҘең°еҲ©":"рҹҮҰрҹҮ№",
      "Hungary":"рҹҮӯрҹҮә","еҢҲзүҷеҲ©":"рҹҮӯрҹҮә",
      "Slovakia":"рҹҮёрҹҮ°","ж–Ҝжҙӣдјҗе…Ӣ":"рҹҮёрҹҮ°",
      "Slovenia":"рҹҮёрҹҮ®","ж–Ҝжҙӣж–Үе°јдәҡ":"рҹҮёрҹҮ®",
      "TBD":"вҡҪ"
    };
    const flag = n => TEAM_FLAGS[n] || "вҡҪ";
    в”Җв”Җ */

    /* в”Җв”Җ жёІжҹ“еҷЁеӯ—е…ё в”Җв”Җ */
    const renderers = {

      feature(b) {
        let matchHtml = "";
        if (b.home && b.away) {
          const scoreHtml = b.score
            ? `<div class="feature-score">${esc(b.score)}</div>`
            : `<div class="feature-score" style="font-size:13px;color:var(--muted)">VS</div>`;
          matchHtml = `
            <div class="feature-match">
              <table width="100%">
                <tbody>
                  <tr>
                    <th width="10%"><img src="${b.home_flag}" width="36" alt="Flag of ${b.home}"></th>
                    <th width="25%"><div class="feature-team">${esc(b.home)}</div></th>
                    <th width="30%">${scoreHtml}</th>
                    <th width="25%"><div class="feature-team">${esc(b.away)}</div></th>
                    <th width="10%" text-align="left"><img src="${b.away_flag}" width="36" alt="Flag of ${b.away}"></th>
                  </tr>
                </tbody>
              </table>
            </div>`;
        }
        return matchHtml + `<div class="feature-content">${esc(b.content || "")}</div>`;
      },

      match_list(b) {
        return (b.items || []).map(m => {
          const scoreStr = (m.home_score !== undefined && m.away_score !== undefined)
            ? `${m.home_score} : ${m.away_score}` : "- : -";
          const meta = [m.kickoff_et, m.venue, m.group].filter(Boolean).join(" В· ");
          const noteHtml = m.note
            ? `<div class="match-note">рҹ’¬ ${esc(m.note)}</div>` : "";
          return `
            <div class="match-row">
              <div style="flex:1">
                <div class="match-teams">
                  <table width="80%">
                    <tbody>
                      <tr>
                        <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${m.home_team}"></th>
                        <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                        <th width="30%">${scoreStr}</th>
                        <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                        <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${m.away_team}"></th>
                      </tr>
                    </tbody>
                  </table> 
                </div>
                ${noteHtml}
              </div>
              <div class="match-meta">${esc(meta)}</div>
            </div>`;
        }).join("");
      },

      schedule(b) {
        return (b.items || []).map(m => `
          <div class="schedule-row">
            <div class="schedule-teams">
              <table width="80%">
                <tbody>
                  <tr>
                    <th width="10%"><img src="${m.home_flag}" width="36" alt="Flag of ${m.home_team}"></th>
                    <th width="25%"><div class="feature-team">${esc(m.home_team)}</div></th>
                    <th width="30%"><span style="color:var(--muted); font-weight:400; font-size:22px; margin:0 6px">vs</span></th>
                    <th width="25%"><div class="feature-team">${esc(m.away_team)}</div></th>
                    <th width="10%" text-align="left"><img src="${m.away_flag}" width="36" alt="Flag of ${m.away_team}"></th>
                  </tr>
                </tbody>
              </table> 
            </div>
            <div class="schedule-time">вҸ° ${esc(m.kickoff_et || "TBD")}</div>
            ${m.group ? `<div class="schedule-group">[${esc(m.group)}]</div>` : ""}
          </div>`).join("");
      },

      standings(b){
        blockHtml = `
          <div class="standings-grid">
              ${b.items.map(group => `
                  <div class="group-card">
                      <div class="group-title">рҹҸҶ ${group.group.replace('Group', 'е°Ҹз»„')}</div>
                      <table class="standings-table">
                          <thead>
                              <tr>
                                  <th class="col-pos">#</th>
                                  <th class="col-team">зҗғйҳҹ</th>
                                  <th class="col-pts" style="text-align: center;">з§ҜеҲҶ</th>
                              </tr>
                          </thead>
                          <tbody>
                              ${group.table.map(team => `
                                  <tr>
                                      <td class="col-pos">${team.position}</td>
                                      <td class="col-team">${team.emoji || 'рҹҸі'} ${team.team}</td>
                                      <td class="col-pts" style="text-align: center;"><b>${team.points}</b></td>
                                  </tr>
                              `).join('')}
                          </tbody>
                      </table>
                  </div>
              `).join('')}
          </div>
        `;
        return blockHtml;
      },

      ranking(b) {
        const medals = ["medal-1","medal-2","medal-3"];
        const rows = (b.items || []).map((r, i) => {
          const medalClass = medals[i] || "";
          const penHtml = r.penalties
            ? `<div class="rank-pen">еҗ«зӮ№зҗғ ${r.penalties}</div>` : "";
          return `
            <tr>
              <td class="rank-num">${r.rank}</td>
              <td>
                <div class="rank-name ${medalClass}">${esc(r.player_name)}</div>
                <div class="rank-team">${esc(r.team_emoji)} ${esc(r.team_name)}</div>
              </td>
              <td class="rank-goals">${r.goals}</td>
              <td>${penHtml}</td>
            </tr>`;
        }).join("");
        return `
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th><th>зҗғе‘ҳ В· еӣҪе®¶йҳҹ</th>
                <th style="text-align:right">иҝӣзҗғ</th>
                <th style="text-align:right">зӮ№зҗғ</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;
      },

      news_feed(b) {
        return (b.items || []).map(n => `
          <div class="news-item">
            <span class="news-tag">${esc(n.tag || "ж–°й—»")}</span>
            <span class="news-text">${esc(n.text || "")}</span><br>
            ${n.url ? `<a class="news-link" href="${esc(n.url)}" target="_blank" rel="noopener">вҶ’ жҹҘзңӢиҜҰжғ…</a>` : ""}
          </div>`).join("");
      }
    };

    /* в”Җв”Җ еӣҫж Үжҳ е°„ в”Җв”Җ */
    const BLOCK_ICONS = {
      feature: "рҹҸҶ", match_list: "рҹ“Ҡ", schedule: "рҹ“…", 
      ranking: "вҡҪ", standings: "рҹ“Ҡ", news_feed: "рҹ“°"
    };

    /* в”Җв”Җ XSS иҪ¬д№ү в”Җв”Җ */
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    /* в”Җв”Җ дё»жёІжҹ“ в”Җв”Җ */
    document.addEventListener("DOMContentLoaded", () => {
      const app = document.getElementById("app");
      try {
        const raw  = document.getElementById("data-json").textContent;
        const data = JSON.parse(raw);
        const html = (data.blocks || []).map(b => {
          const icon    = BLOCK_ICONS[b.type] || "вҖў";
          const inner   = renderers[b.type] ? renderers[b.type](b) : "";
          return `
            <div class="section-label">${icon} ${esc(b.title || b.type)}</div>
            <div class="card">${inner}</div>`;
        }).join("");
        app.innerHTML = html || "<p style='color:var(--muted)'>жҡӮж— еҶ…е®№</p>";
      } catch(e) {
        app.innerHTML = `<p style="color:var(--red)">вҡ  ж•°жҚ®еҠ иҪҪеӨұиҙҘпјҡ${esc(e.message)}</p>`;
      }
    });
  })();
  </script>
</body>
