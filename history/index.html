<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026美加墨世界杯情报站 - 历史归档</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --container-bg: #111b15;
            --card-bg: #1c2a21;
            --primary-gold: #f3a04c;
            --accent-green: #40b43e;
            --text-main: #f3f4f6;
            --text-muted: rgba(243, 244, 246, 0.7);
            --border-color: rgba(243, 244, 246, 0.08);
            --radius-md: 12px;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f4f6f8;
                --container-bg: #ffffff;
                --card-bg: #f8fafc;
                --primary-gold: #e58522;
                --accent-green: #38a136;
                --text-main: #1e293b;
                --text-muted: #64748b;
                --border-color: #e2e8f0;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
        }

        .wrapper {
            max-width: 720px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-gold);
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 2px solid var(--primary-gold);
            padding-bottom: 15px;
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        li {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 14.5px;
        }

        a::after {
            content: '→';
            color: var(--accent-green);
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        li:hover a::after {
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>2026美加墨世界杯情报站 - 历史归档</h1>
        <p>每日美东时间晚上 10:00 准时更新。只选择 Tier 1 级媒体深度去重，为你奉上最硬核的世界杯深夜闭门内参。</p>
        <ul>
            <li><a href="2026-05-29.html">2026-05-29 世界杯情报日报</a></li>

        </ul>
    </div>
</body>
</html>
