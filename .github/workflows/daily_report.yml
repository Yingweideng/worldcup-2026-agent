name: 2026 World Cup Daily Report Bot

on:
  schedule:
    # 每日 UTC 02:00 运行（对应美东 EDT 晚上 10:00）
    - cron: '11 2 * * *'
  workflow_dispatch: # 支持手动触发测试

permissions:
  contents: write # 允许 Action 把文件提交回 main 分支
  pages: write # 允许 Action 把 HTML 部署到 gh-pages 分支
  id-token: write # GitHub Pages 部署所需的身份令牌

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install system dependencies      
      run: |        
        sudo apt-get update        
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev

    - name: Install Python dependencies      
      run: |        
        python -m pip install --upgrade pip        
        pip install -r requirements.txt

    - name: Install Playwright browsers      
      run: |        
        playwright install --with-deps chromium        

    - name: Run Telegram Bot Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python src/main.py

    - name: Commit & Push Changes to Main
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/processed_urls.json history/
        git diff-index --quiet HEAD || (git commit -m "Auto-update: daily report and de-duplication database [skip ci]" && git push origin main)

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./history
        publish_branch: gh-pages
